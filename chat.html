<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>消息</title>
  <link rel="stylesheet" href="styles/chat.css">
  <style id="custom-theme-css"></style>
</head>
<body id="chat-body">
  <!-- 顶栏 -->
  <div class="qq-topbar" id="qq-topbar">
    <button class="topbar-btn back-btn" onclick="goBack()">←</button>
    <div class="topbar-title" id="topbar-title">消息</div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="openAddMenu()">＋</button>
    </div>
  </div>

  <!-- 搜索栏 -->
  <div class="qq-search" id="qq-search">
    <input type="text" id="search-input" placeholder="搜索" oninput="filterCharacters()">
  </div>

  <!-- 滑动容器 -->
  <div class="swipe-container" id="swipe-container">
    <!-- 消息页 -->
    <div class="swipe-page" id="page-messages">
      <div class="character-list" id="character-list"></div>
    </div>
    
    <!-- 主题页 -->
    <div class="swipe-page" id="page-theme">
      <div class="theme-panel">
        <div class="theme-section">
          <div class="section-title">主题色</div>
          <div class="theme-item" onclick="openTopbarColorPicker()">
            <span>顶栏颜色</span>
            <div class="color-preview" id="topbar-color-preview"></div>
          </div>
          <div class="theme-item" onclick="openBubbleColorPicker()">
            <span>气泡颜色</span>
            <div class="color-preview" id="bubble-color-preview"></div>
          </div>
        </div>
        
        <div class="theme-section">
          <div class="section-title">个性装扮</div>
          <div class="theme-item" onclick="openWallpaperPicker()">
            <span>主界面壁纸</span>
            <span class="arrow">›</span>
          </div>
          <div class="theme-item" onclick="openAvatarFramePicker()">
            <span>头像框</span>
            <span class="arrow">›</span>
          </div>
        </div>
        
        <div class="theme-section">
          <div class="section-title">高级</div>
          <div class="theme-item" onclick="openCustomCSS()">
            <span>自定义CSS</span>
            <span class="arrow">›</span>
          </div>
          <div class="theme-item danger" onclick="resetTheme()">
            <span>重置主题</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 空间页 -->
    <div class="swipe-page" id="page-space">
      <div class="space-page">
        <!-- 封面区 -->
        <div class="space-cover" id="space-cover" onclick="uploadSpaceCover()">
          <img id="space-cover-img" src="" style="display:none;">
          <div class="space-cover-placeholder" id="space-cover-placeholder">点击设置封面</div>
        </div>
        <!-- 交界处：用户头像 + 用户名 -->
        <div class="space-profile">
          <div class="space-avatar-wrapper" onclick="uploadSpaceAvatar()">
            <div class="space-avatar" id="space-avatar"></div>
          </div>
          <div class="space-username" id="space-username"></div>
          <label class="toggle-switch" style="margin-left:auto;">
            <input type="checkbox" id="dynamics-toggle" onchange="toggleDynamics()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <!-- 动态流 -->
        <div class="space-feed" id="space-feed"></div>
        <!-- 新建动态FAB -->
        <div class="space-fab" onclick="openNewPostEditor()">✎</div>
      </div>
    </div>
  </div>

  <!-- 底部标签栏 -->
  <div class="qq-tabbar" id="qq-tabbar">
    <div class="tab-item active" onclick="switchPage(0)">
      <div class="tab-icon">💬</div>
      <div class="tab-name">消息</div>
    </div>
    <div class="tab-item" onclick="switchPage(1)">
      <div class="tab-icon">🎨</div>
      <div class="tab-name">主题</div>
    </div>
    <div class="tab-item" onclick="switchPage(2)">
      <div class="tab-icon">⭐</div>
      <div class="tab-name">空间</div>
    </div>
  </div>

  <!-- 添加角色弹窗 -->
  <div class="modal" id="add-modal">
    <div class="modal-backdrop" onclick="closeAddModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>添加角色</span>
        <button class="close-btn" onclick="closeAddModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="add-options">
          <div class="add-option" onclick="showManualForm()">
            <div class="option-icon themed-gradient-icon">✎</div>
            <div class="option-text">手动创建角色</div>
          </div>
          <div class="add-option" onclick="window.location.href='group-create.html'">
            <div class="option-icon themed-gradient-icon">♞</div>
            <div class="option-text">创建群聊</div>
          </div>
          <div class="add-option" onclick="showQIDSearch()">
            <div class="option-icon themed-gradient-icon">⌕</div>
            <div class="option-text">通过QID添加MoMo好友</div>
          </div>
        </div>

        <div id="qid-search-form" style="display:none;">
          <div class="form-group">
            <label>输入QID（6位数字）</label>
            <input type="text" id="qid-input" placeholder="例如：123456" maxlength="6" pattern="[0-9]*" inputmode="numeric">
          </div>
          <button class="save-btn" onclick="searchMomoByQID()">搜索并添加</button>
        </div>

        <div id="manual-form" style="display:none;">
          <div class="form-group">
            <label>头像</label>
            <div class="avatar-upload" onclick="document.getElementById('avatar-input').click()">
              <div class="avatar-preview" id="avatar-preview"><span>点击上传</span></div>
            </div>
          </div>
          <div class="form-group">
            <label>角色名称 *</label>
            <input type="text" id="char-name" placeholder="输入角色名">
          </div>
          <div class="form-group">
            <label>个性签名</label>
            <input type="text" id="char-signature" placeholder="一句话介绍">
          </div>
          <div class="form-group">
            <label>角色设定</label>
            <textarea id="char-description" rows="4" placeholder="角色的背景、性格等"></textarea>
          </div>
          <div class="collapse-panel" style="margin-top:10px;border:1px solid #eee;border-radius:10px;">
            <div class="collapse-header" onclick="this.parentElement.classList.toggle('open')" style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
              <span style="font-size:14px;font-weight:500;">⚙️ 高级设定</span>
              <span class="collapse-arrow" style="font-size:12px;transition:transform 0.2s;">▼</span>
            </div>
            <div class="collapse-body" style="padding:0 12px 12px;display:none;">
              <div class="form-group">
                <label>对话示例</label>
                <textarea id="char-example" rows="3" placeholder="{{user}}: 你好\n{{char}}: 你好呀~"></textarea>
              </div>
              <div class="form-group">
                <label>开场白</label>
                <textarea id="char-greeting" rows="3" placeholder="角色的第一句话"></textarea>
              </div>
            </div>
          </div>
          <style>
            .collapse-panel.open .collapse-body { display: block !important; }
            .collapse-panel.open .collapse-arrow { transform: rotate(180deg); }
          </style>
          <button class="save-btn" onclick="saveCharacter()">创建角色</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 颜色选择器弹窗 -->
  <div class="modal" id="color-picker-modal">
    <div class="modal-backdrop" onclick="closeColorPicker()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span id="color-picker-title">选择颜色</span>
        <button class="close-btn" onclick="closeColorPicker()">✕</button>
      </div>
      <div class="modal-body">
        <div class="selected-colors" id="selected-colors"></div>
        <div class="gradient-direction" id="gradient-direction">
          <span class="dir-option selected" data-dir="90deg" onclick="selectGradientDir('90deg')">→</span>
          <span class="dir-option" data-dir="180deg" onclick="selectGradientDir('180deg')">↓</span>
          <span class="dir-option" data-dir="135deg" onclick="selectGradientDir('135deg')">↘</span>
          <span class="dir-option" data-dir="45deg" onclick="selectGradientDir('45deg')">↗</span>
        </div>
        <div class="color-presets" id="color-presets"></div>
        <div class="custom-color">
          <input type="color" id="custom-color-input" value="#12B7F5">
          <span>自定义颜色</span>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-secondary" onclick="addColorToGradient()" style="flex:1;">+ 添加颜色</button>
          <button class="save-btn" onclick="applyColor()" style="flex:1;">应用</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 头像框选择弹窗 -->
  <div class="modal" id="frame-picker-modal">
    <div class="modal-backdrop" onclick="closeFramePicker()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>选择头像框</span>
        <button class="close-btn" onclick="closeFramePicker()">✕</button>
      </div>
      <div class="modal-body">
        <div class="frame-grid" id="frame-grid"></div>
      </div>
    </div>
  </div>

  <!-- 壁纸选择弹窗 -->
  <div class="modal" id="wallpaper-modal">
    <div class="modal-backdrop" onclick="closeWallpaperModal()"></div>
    <div class="modal-content wallpaper-modal-content">
      <div class="modal-header">
        <span>主界面壁纸</span>
        <button class="close-btn" onclick="closeWallpaperModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="wallpaper-actions">
          <div class="wallpaper-action" onclick="document.getElementById('wallpaper-input').click()">
            <div class="action-icon">📁</div>
            <div class="action-text">添加新壁纸</div>
          </div>
          <div class="wallpaper-action" onclick="removeWallpaper()">
            <div class="action-icon">🗑️</div>
            <div class="action-text">移除壁纸</div>
          </div>
        </div>
        <div class="wallpaper-library" id="wallpaper-library"></div>
      </div>
    </div>
  </div>

  <!-- 自定义CSS弹窗 -->
  <div class="modal" id="css-modal">
    <div class="modal-backdrop" onclick="closeCSSModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>自定义CSS</span>
        <button class="close-btn" onclick="closeCSSModal()">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="custom-css-input" rows="10" placeholder="输入自定义CSS..."></textarea>
        <div class="btn-row">
          <button class="btn-secondary" onclick="previewCSS()">预览</button>
          <button class="save-btn" onclick="saveCSS()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)">
  <input type="file" id="wallpaper-input" accept="image/*" style="display:none" onchange="addWallpaper(this)">
  <input type="file" id="space-cover-input" accept="image/*" style="display:none" onchange="handleSpaceCoverSelect(this)">
  <input type="file" id="space-avatar-input" accept="image/*" style="display:none" onchange="handleSpaceAvatarSelect(this)">
  <input type="file" id="post-image-input" accept="image/*" multiple style="display:none" onchange="handlePostImageSelect(this)">

  <!-- 新建动态编辑器 -->
  <div class="modal" id="new-post-modal">
    <div class="modal-backdrop" onclick="closeNewPostEditor()"></div>
    <div class="modal-content">
      <div class="modal-header"><span>发布动态</span><button class="close-btn" onclick="closeNewPostEditor()">✕</button></div>
      <div class="modal-body">
        <textarea id="post-text-input" placeholder="说点什么..." rows="5" style="width:100%;padding:10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;resize:vertical;margin-bottom:8px;"></textarea>
        <div class="post-image-preview" id="post-image-preview"></div>
        <div class="post-toolbar">
          <button class="post-tool-btn" onclick="document.getElementById('post-image-input').click()">🖼️ 图片</button>
        </div>
        <button class="save-btn" onclick="submitNewPost()" style="margin-top:8px;">发布</button>
      </div>
    </div>
  </div>

  <!-- chat.js 中已定义 goBack() -->
  <script src="scripts/chat.js"></script>
</body>
</html>
