<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>线下模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      display: flex;
      flex-direction: column;
    }
    
    .topbar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    
    .back-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    
    .topbar-title {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      margin-right: 36px;
    }
    
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }
    
    .desc {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 32px;
    }
    
    .features {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 320px;
      text-align: left;
    }
    
    .features-title {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 12px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .feature-item:last-child { border-bottom: none; }
    .feature-item .icon-small { font-size: 20px; }
    .feature-item span { font-size: 14px; color: #fff; }
    
    .coming-soon {
      margin-top: 40px;
      padding: 12px 32px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="topbar-title">线下模式</div>
  </div>
  
  <div class="content">
    <div class="icon">📴</div>
    <h1 class="title">线下模式</h1>
    <p class="desc">在这里，角色将"离开"聊天，你可以安排他们的线下活动和日程</p>
    
    <div class="features">
      <div class="features-title">即将支持的功能</div>
      <div class="feature-item">
        <span class="icon-small">📅</span>
        <span>角色日程安排</span>
      </div>
      <div class="feature-item">
        <span class="icon-small">🏃</span>
        <span>模拟角色活动</span>
      </div>
      <div class="feature-item">
        <span class="icon-small">💭</span>
        <span>离线时的想念消息</span>
      </div>
      <div class="feature-item">
        <span class="icon-small">🎁</span>
        <span>回归惊喜事件</span>
      </div>
    </div>
    
    <button class="coming-soon">🚧 功能开发中...</button>
  </div>
  
  <script>
    function goBack() {
      const urlParams = new URLSearchParams(window.location.search);
      const charId = urlParams.get('id');
      if (charId) {
        window.location.href = 'chat-room.html?id=' + charId;
      } else {
        window.history.back();
      }
    }
  </script>
</body>
</html>
