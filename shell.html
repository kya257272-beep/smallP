<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Small Phone</title>
  <link rel="stylesheet" href="styles/shell-music.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #content-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="content-frame" src="index.html"></iframe>
  
  <script src="scripts/shell-music.js"></script>
  <script>
    (function() {
      const frame = document.getElementById('content-frame');
      
      // 初始化音乐控制器
      if (window.ShellMusicController) {
        window.ShellMusicController.setContentFrame(frame);
        window.ShellMusicController.init();
      }
      
      // 监听 iframe 导航请求
      window.addEventListener('message', function(e) {
        const data = e.data;
        if (data && data.type === 'navigate' && data.url) {
          frame.src = data.url;
        }
      });
      
      // 应用保存的主题色
      function applyThemeColor() {
        const color = localStorage.getItem('buttonColor') || '#f8cbd0';
        document.documentElement.style.setProperty('--btn-color', color);
        
        // 计算hover颜色
        function shadeColor(hex, percent) {
          if (!hex) return hex;
          if (hex.length === 4) hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
          const r = Math.min(255, Math.max(0, Math.round(parseInt(hex.slice(1,3),16) * (100 + percent) / 100)));
          const g = Math.min(255, Math.max(0, Math.round(parseInt(hex.slice(3,5),16) * (100 + percent) / 100)));
          const b = Math.min(255, Math.max(0, Math.round(parseInt(hex.slice(5,7),16) * (100 + percent) / 100)));
          return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
        }
        document.documentElement.style.setProperty('--btn-hover', shadeColor(color, -12));
      }
      
      applyThemeColor();
      
      // 监听主题变化
      window.addEventListener('storage', function(e) {
        if (e.key === 'buttonColor' || e.key === 'theme') {
          applyThemeColor();
        }
      });
    })();
  </script>
</body>
</html>
